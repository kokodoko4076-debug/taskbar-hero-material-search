<!DOCTYPE html>

<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskbar Hero 素材検索</title>
    <div class="search-header">
  <span>💎 素材逆引き検索</span>
  <span id="matchCount">0 MATCHES</span>
</div>


<link rel="stylesheet" href="style.css">


</head>
<body>

<header>
    <h1>Taskbar Hero 素材検索</h1>
</header>

<main>


<div class="tabs">
    <button class="tab active" data-type="weapon">⚔ 武器</button>
    <button class="tab" data-type="armor">🛡 防具</button>
    <button class="tab" data-type="accessory">💍 アクセサリー</button>
</div>

<input
    type="text"
    id="searchInput"
    placeholder="素材名検索..."
>

    <div class="type-filter">

<label>
<input type="checkbox"
       id="ornamentCheck"
       checked>
装飾
</label>

<label>
<input type="checkbox"
       id="engravingCheck"
       checked>
彫刻
</label>

</div>

<div class="effect-grid">

<button class="effect-btn" data-effect="">全て</button>

<button class="effect-btn" data-effect="攻撃速度">攻撃速度</button>
<button class="effect-btn" data-effect="攻撃力">攻撃力</button>
<button class="effect-btn" data-effect="クリティカル率">クリティカル率</button>
<button class="effect-btn" data-effect="クリティカルダメージ">クリダメ</button>

<button class="effect-btn" data-effect="最大HP">最大HP</button>
<button class="effect-btn" data-effect="ライフ吸収">ライフ吸収</button>

<button class="effect-btn" data-effect="クールダウン">クールダウン</button>
<button class="effect-btn" data-effect="移動速度">移動速度</button>

</div>

<table class="result-table">

<thead>
<tr>
<th>素材名</th>
<th>レア</th>
<th>種類</th>
<th>部位</th>
<th>補正値</th>
</tr>
</thead>

<tbody id="results">
</tbody>

</table>


</main>

<script src="app.js"></script>

</body>
</html>
